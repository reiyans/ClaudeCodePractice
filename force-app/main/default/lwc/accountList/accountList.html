<template>
    <lightning-card title="取引先一覧">
        <div class="slds-var-p-around_medium">
            <template if:true={accounts.data}>
                <lightning-datatable
                    key-field="Id"
                    data={accounts.data}
                    columns={columns}
                ></lightning-datatable>
            </template>
            <template if:true={accounts.error}>
                <p class="slds-text-color_error">データの取得に失敗しました。</p>
            </template>
        </div>
    </lightning-card>
</template>
